<!DOCTYPE html>
<html>
<body>

<textarea id="prompt"></textarea>
<button onclick="generate()">
Generate
</button>

<script>
async function generate() {

const prompt =
document.getElementById("prompt").value

const r = await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt
})
})

const data = await r.json()

alert(data.job_id)
}
</script>

</body>
</html>
